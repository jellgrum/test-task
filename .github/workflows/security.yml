name: Security

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Linting"]
    types:
      - completed
    branches:
      - '**'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-backend-image:
    name: Scan backend image (Trivy)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t test-task-backend ./backend

      - name: Run Trivy vulnerability scanner on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-task-backend'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  scan-nginx-image:
    name: Scan nginx image (Trivy)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Pull nginx image
        run: docker pull nginx:1.28.3-alpine

      - name: Run Trivy vulnerability scanner on nginx image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nginx:1.28.3-alpine'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  scan-docker-compose:
    name: Scan docker-compose.yml (Trivy)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy config scanner on docker-compose.yml
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'docker-compose.yml'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'