name: Security

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-backend-image:
    name: Scan backend image (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t test-task-backend ./backend

      - name: Run Trivy vulnerability scanner on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-task-backend'
          format: 'table'
          ignore-unfixed: true
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  scan-nginx-image:
    name: Scan nginx image (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build nginx image
        run: docker build -t test-task-nginx ./nginx

      - name: Run Trivy vulnerability scanner on nginx image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-task-nginx'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  scan-docker-compose:
    name: Scan docker-compose.yml (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy config scanner on docker-compose.yml
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'docker-compose.yml'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
